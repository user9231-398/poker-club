<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Poker Club - Dealer</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--bg); }
    .settings-toggle {
      background: none; border: none; color: var(--text-dim); font-size: 1.3rem;
      cursor: pointer; padding: 0.3rem; transition: color 0.2s;
    }
    .settings-toggle:hover, .settings-toggle.open { color: var(--gold); }
    .admin-section {
      max-height: 0; overflow: hidden; transition: max-height 0.35s ease;
    }
    .admin-section.open { max-height: 1200px; }
    .admin-section .panel { margin-bottom: 1rem; }
    .divider {
      border: none; border-top: 1px solid var(--border); margin: 1rem 0;
    }
  </style>
</head>
<body>
  <!-- PIN Screen -->
  <div id="pinScreen" class="pin-screen">
    <h2><span style="color:var(--gold);">&spades;&hearts;&clubs;&diams;</span><br>Dealer Login</h2>
    <input type="password" id="pinInput" class="pin-input" maxlength="6" placeholder="PIN" inputmode="numeric" autocomplete="off">
    <div id="pinError" class="pin-error"></div>
    <button class="btn btn-gold btn-lg" onclick="authenticate()">Enter</button>
  </div>

  <!-- Main Interface -->
  <div id="dealerMain" style="display:none;">
    <div class="header">
      <h1><span class="suits">&spades;&hearts;</span> <span id="dealerSessionName">Dealer</span></h1>
      <button class="settings-toggle" id="settingsBtn" onclick="toggleSettings()" title="Settings">&#9881;</button>
    </div>

    <div class="dealer-container">

      <!-- ── Admin / Settings Section (collapsible) ──────────────── -->
      <div id="adminSection" class="admin-section">

        <!-- Session Settings -->
        <div class="panel">
          <div class="panel-header">Session Settings</div>
          <div class="panel-body">
            <div class="form-row">
              <div class="form-group">
                <label>Session Name</label>
                <input type="text" id="sessionNameInput" placeholder="Poker Night">
              </div>
              <div class="form-group">
                <label>Dealer PIN</label>
                <input type="text" id="dealerPinInput" placeholder="1234" maxlength="6">
              </div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="saveSettings(this)">Save Settings</button>
          </div>
        </div>

        <!-- Add Table -->
        <div class="panel">
          <div class="panel-header">Add New Table</div>
          <div class="panel-body">
            <div class="form-row">
              <div class="form-group">
                <label>Table Name</label>
                <input type="text" id="newTableName" placeholder="Table 1">
              </div>
              <div class="form-group">
                <label>Seats</label>
                <select id="newTableSeats">
                  <option value="4">4 seats</option>
                  <option value="6">6 seats</option>
                  <option value="8" selected>8 seats</option>
                  <option value="9">9 seats</option>
                  <option value="10">10 seats</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label>Dealer Name (optional)</label>
              <input type="text" id="newDealerName" placeholder="Dealer name">
            </div>
            <button class="btn btn-gold btn-sm" onclick="addTable()">Add Table</button>
          </div>
        </div>

        <!-- Manage Tables -->
        <div class="panel">
          <div class="panel-header">
            Manage Tables
            <span id="adminTableCount" style="color:var(--text-dim);font-weight:500;font-size:0.8rem;"></span>
          </div>
          <div class="panel-body">
            <div id="adminTablesList"></div>
          </div>
        </div>

        <!-- Quick Links -->
        <div class="panel">
          <div class="panel-header">Share Links</div>
          <div class="panel-body">
            <p style="font-size:0.8rem;color:var(--text-dim);margin-bottom:0.5rem;">
              Everyone must be on the same Wi-Fi network (or use the deployed URL).
            </p>
            <div style="display:flex;flex-direction:column;gap:0.4rem;">
              <div style="background:var(--bg);padding:0.5rem 0.7rem;border-radius:8px;font-family:monospace;font-size:0.75rem;" id="displayLink"></div>
              <div style="background:var(--bg);padding:0.5rem 0.7rem;border-radius:8px;font-family:monospace;font-size:0.75rem;" id="dealerLink"></div>
            </div>
          </div>
        </div>

        <!-- Danger Zone -->
        <div class="panel" style="border-color:var(--red);">
          <div class="panel-header" style="color:var(--red);">Danger Zone</div>
          <div class="panel-body">
            <button class="btn btn-danger btn-sm" onclick="resetAll()">Reset Everything</button>
            <p style="font-size:0.7rem;color:var(--text-dim);margin-top:0.4rem;">Removes all tables and players. Cannot be undone.</p>
          </div>
        </div>

        <hr class="divider">
      </div>

      <!-- ── Dealer Controls ─────────────────────────────────────── -->

      <!-- Table selector tabs -->
      <div id="tableTabs" class="tab-bar"></div>

      <!-- Quick Add Player -->
      <div id="quickAdd" class="player-card" style="display:none;border-color:var(--gold);background:var(--surface2);">
        <div style="font-weight:700;font-size:0.85rem;margin-bottom:0.5rem;color:var(--gold);">+ Add Player</div>
        <div style="display:flex;gap:0.5rem;">
          <input type="text" id="quickAddInput" placeholder="Player name..." style="flex:1;"
            onkeydown="if(event.key==='Enter')quickAddPlayer()">
          <button class="btn btn-gold btn-sm" onclick="quickAddPlayer()">Add</button>
        </div>
        <div id="quickAddInfo" style="font-size:0.7rem;color:var(--text-dim);margin-top:0.4rem;"></div>
      </div>

      <!-- Seats for selected table -->
      <div id="seatsList"></div>
    </div>
  </div>

  <!-- Credits Edit Modal -->
  <div id="scoreModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>Update Credits</h3>
      <div class="form-group">
        <label>Player: <span id="modalPlayerName"></span></label>
      </div>
      <div class="form-group">
        <label>Credits</label>
        <input type="number" id="modalScoreInput" inputmode="numeric">
      </div>
      <div class="form-group">
        <label>Knockouts</label>
        <input type="number" id="modalKoInput" inputmode="numeric" min="0">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-gold" onclick="saveModal()">Save</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let tables = [];
    let selectedTableId = null;
    let modalContext = null;

    // Show share links
    const base = window.location.origin;
    document.getElementById('displayLink').textContent = 'Display: ' + base + '/display.html';
    document.getElementById('dealerLink').textContent = 'Dealer:  ' + base + '/dealer.html';

    // ── Auth ───────────────────────────────────────────────────────
    function authenticate() {
      const pin = document.getElementById('pinInput').value;
      socket.emit('dealerAuth', pin, (res) => {
        if (res.success) {
          document.getElementById('pinScreen').style.display = 'none';
          document.getElementById('dealerMain').style.display = 'block';
        } else {
          document.getElementById('pinError').textContent = 'Wrong PIN';
          document.getElementById('pinInput').value = '';
          document.getElementById('pinInput').focus();
        }
      });
    }

    document.getElementById('pinInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') authenticate();
    });

    // ── Settings toggle ────────────────────────────────────────────
    function toggleSettings() {
      const section = document.getElementById('adminSection');
      const btn = document.getElementById('settingsBtn');
      section.classList.toggle('open');
      btn.classList.toggle('open');
    }

    // ── Admin actions ──────────────────────────────────────────────
    function saveSettings(btn) {
      const name = document.getElementById('sessionNameInput').value;
      const pin = document.getElementById('dealerPinInput').value;
      if (name) socket.emit('setSessionName', name);
      if (pin) socket.emit('setDealerPin', pin);
      btn.textContent = 'Saved!';
      setTimeout(() => btn.textContent = 'Save Settings', 1500);
    }

    function addTable() {
      const name = document.getElementById('newTableName').value;
      const seatCount = Number(document.getElementById('newTableSeats').value);
      const dealerName = document.getElementById('newDealerName').value;
      socket.emit('addTable', { name, seatCount, dealerName });
      document.getElementById('newTableName').value = '';
      document.getElementById('newDealerName').value = '';
    }

    function removeTable(id) {
      if (confirm('Remove this table? All player data on it will be lost.')) {
        socket.emit('removeTable', id);
      }
    }

    function updateTable(id, field, value) {
      const update = { tableId: id };
      update[field] = value;
      socket.emit('updateTable', update);
    }

    function resetAll() {
      if (confirm('This will delete ALL tables and players. Are you sure?')) {
        if (confirm('Really sure? This cannot be undone.')) {
          socket.emit('resetAll');
        }
      }
    }

    function renderAdminTables() {
      const container = document.getElementById('adminTablesList');
      document.getElementById('adminTableCount').textContent = tables.length + ' table' + (tables.length !== 1 ? 's' : '');

      if (tables.length === 0) {
        container.innerHTML = '<div class="empty-state" style="padding:1rem;"><p>No tables yet. Add one above.</p></div>';
        return;
      }

      container.innerHTML = tables.map(t => {
        const playerCount = t.seats.filter(s => s.playerName).length;
        return `
          <div class="table-admin-card animate-in">
            <div class="table-admin-header">
              <div>
                <strong>${t.name}</strong>
                <span style="color:var(--text-dim);font-size:0.8rem;margin-left:0.5rem;">
                  ${playerCount}/${t.seats.length} seats
                </span>
              </div>
              <button class="btn btn-danger btn-sm" onclick="removeTable('${t.id}')">Remove</button>
            </div>
            <div class="form-row" style="margin-top:0.5rem;">
              <div class="form-group" style="margin-bottom:0;">
                <input type="text" value="${t.name}" placeholder="Table name"
                  onchange="updateTable('${t.id}', 'name', this.value)">
              </div>
              <div class="form-group" style="margin-bottom:0;">
                <input type="text" value="${t.dealerName || ''}" placeholder="Dealer name"
                  onchange="updateTable('${t.id}', 'dealerName', this.value)">
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // ── State handling ─────────────────────────────────────────────
    socket.on('state', (data) => {
      tables = data.tables;
      document.getElementById('dealerSessionName').textContent = data.sessionName;
      document.getElementById('sessionNameInput').placeholder = data.sessionName;

      if (!selectedTableId || !tables.find(t => t.id === selectedTableId)) {
        selectedTableId = tables.length ? tables[0].id : null;
      }

      renderTabs();
      renderSeats();
      updateQuickAdd();
      renderAdminTables();
    });

    function renderTabs() {
      const container = document.getElementById('tableTabs');
      if (tables.length === 0) {
        container.innerHTML = '';
        return;
      }
      container.innerHTML = tables.map(t => `
        <button class="${t.id === selectedTableId ? 'active' : ''}" onclick="selectTable('${t.id}')">
          ${t.name}
        </button>
      `).join('');
    }

    function selectTable(id) {
      selectedTableId = id;
      renderTabs();
      renderSeats();
      updateQuickAdd();
    }

    function renderSeats() {
      const container = document.getElementById('seatsList');
      const table = tables.find(t => t.id === selectedTableId);

      if (!table) {
        container.innerHTML = '<div class="empty-state"><div class="icon">&clubs;</div><p>No tables yet.<br>Tap the gear icon above to add tables.</p></div>';
        return;
      }

      container.innerHTML = table.seats.map(seat => {
        const hasPlayer = !!seat.playerName;
        const eliminated = seat.eliminated;

        if (!hasPlayer) {
          return `
            <div class="player-card animate-in">
              <div class="player-card-header">
                <div class="seat-num">${seat.position}</div>
                <input class="name-input" type="text" placeholder="Enter player name..."
                  id="nameInput_${seat.position}"
                  onkeydown="if(event.key==='Enter')seatPlayer(${seat.position}, this.value)">
                <button class="btn btn-primary btn-sm" onclick="seatPlayer(${seat.position}, document.getElementById('nameInput_${seat.position}').value)">
                  Seat
                </button>
              </div>
            </div>
          `;
        }

        return `
          <div class="player-card ${eliminated ? 'eliminated-card' : ''} animate-in">
            <div class="player-card-header">
              <div class="seat-num" style="${eliminated ? 'background:var(--red);' : ''}">${seat.position}</div>
              <div style="flex:1;margin:0 0.6rem;">
                <div style="font-weight:700;font-size:0.95rem;${eliminated ? 'text-decoration:line-through;opacity:0.5;' : ''}">${seat.playerName}</div>
                <div style="font-size:0.7rem;color:var(--text-dim);">${seat.knockouts ? seat.knockouts + ' KO' : ''}</div>
              </div>
              <div class="score-controls">
                <button class="score-btn" onclick="addScore('${seat.position}', -100)">&minus;</button>
                <div class="score-value">${seat.score || 0}</div>
                <button class="score-btn" onclick="addScore('${seat.position}', 100)">+</button>
              </div>
            </div>
            <div style="font-size:0.65rem;color:var(--text-dim);text-align:right;margin:-0.2rem 0 0.4rem;">+/- 100 credits</div>
            <div class="player-card-actions">
              <button class="btn btn-ghost btn-sm" style="flex:1;" onclick="openScoreModal(${seat.position}, '${seat.playerName.replace(/'/g, "\\'")}', ${seat.score || 0}, ${seat.knockouts || 0})">
                Set Credits
              </button>
              <button class="btn ${eliminated ? 'btn-primary' : 'btn-danger'} btn-sm" style="flex:1;" onclick="toggleEliminate(${seat.position})">
                ${eliminated ? 'Restore' : 'Eliminate'}
              </button>
              <button class="btn btn-ghost btn-sm" onclick="unseatPlayer(${seat.position})" title="Remove player">
                &times;
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    // ── Quick Add ──────────────────────────────────────────────────
    function quickAddPlayer() {
      const input = document.getElementById('quickAddInput');
      const name = input.value.trim();
      if (!name) return;

      const table = tables.find(t => t.id === selectedTableId);
      if (!table) return;

      const emptySeat = table.seats.find(s => !s.playerName);
      if (!emptySeat) {
        document.getElementById('quickAddInfo').textContent = 'All seats are full!';
        return;
      }

      socket.emit('seatPlayer', { tableId: selectedTableId, position: emptySeat.position, playerName: name });
      input.value = '';
      input.focus();
    }

    function updateQuickAdd() {
      const quickAdd = document.getElementById('quickAdd');
      const table = tables.find(t => t.id === selectedTableId);
      if (!table) {
        quickAdd.style.display = 'none';
        return;
      }
      quickAdd.style.display = 'block';
      const emptyCount = table.seats.filter(s => !s.playerName).length;
      const info = document.getElementById('quickAddInfo');
      if (emptyCount === 0) {
        info.textContent = 'Table full (' + table.seats.length + '/' + table.seats.length + ')';
      } else {
        info.textContent = emptyCount + ' seat' + (emptyCount !== 1 ? 's' : '') + ' available - next: Seat ' +
          table.seats.find(s => !s.playerName).position;
      }
    }

    // ── Dealer Actions ─────────────────────────────────────────────
    function seatPlayer(position, name) {
      if (!name || !name.trim()) return;
      socket.emit('seatPlayer', { tableId: selectedTableId, position, playerName: name.trim() });
    }

    function unseatPlayer(position) {
      if (confirm('Remove this player from the seat?')) {
        socket.emit('unseatPlayer', { tableId: selectedTableId, position });
      }
    }

    function addScore(position, amount) {
      socket.emit('addScore', { tableId: selectedTableId, position: Number(position), amount });
    }

    function toggleEliminate(position) {
      socket.emit('eliminatePlayer', { tableId: selectedTableId, position });
    }

    // ── Score modal ────────────────────────────────────────────────
    function openScoreModal(position, playerName, score, knockouts) {
      modalContext = { position };
      document.getElementById('modalPlayerName').textContent = playerName;
      document.getElementById('modalScoreInput').value = score;
      document.getElementById('modalKoInput').value = knockouts;
      document.getElementById('scoreModal').style.display = 'flex';
      document.getElementById('modalScoreInput').focus();
    }

    function closeModal() {
      document.getElementById('scoreModal').style.display = 'none';
      modalContext = null;
    }

    function saveModal() {
      if (!modalContext) return;
      const score = Number(document.getElementById('modalScoreInput').value) || 0;
      const knockouts = Number(document.getElementById('modalKoInput').value) || 0;
      socket.emit('updateScore', { tableId: selectedTableId, position: modalContext.position, score });
      socket.emit('updateKnockouts', { tableId: selectedTableId, position: modalContext.position, knockouts });
      closeModal();
    }
  </script>
</body>
</html>
